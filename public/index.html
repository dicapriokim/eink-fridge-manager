<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-ink 재고 관리 v5.1.2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/7.2.96/css/materialdesignicons.min.css"
        rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --text-color: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-color: #00d2ff;
            --success-color: #43a047;
            --error-color: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .tab-bar {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: var(--glass-border);
            overflow-x: auto;
            scrollbar-width: none;
            gap: 5px;
        }

        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            flex: 1;
            min-width: 80px;
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-item.active {
            background: var(--glass-bg);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 20px;
            margin-bottom: 20px;
            min-height: 300px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        input,
        select {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            width: 100%;
        }

        input:focus,
        select:focus {
            background: rgba(0, 0, 0, 0.35);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.15);
        }

        .input-pummog {
            flex: 2;
        }

        .input-suryang {
            flex: 1;
            text-align: center;
        }

        .btn-save {
            background: rgba(255, 255, 255, 0.05);
            border: var(--glass-border);
            border-radius: 14px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .btn-save:active {
            transform: scale(0.9);
        }

        .btn-save.success {
            color: var(--success-color);
            border-color: var(--success-color);
            background: rgba(67, 160, 71, 0.1);
        }

        .btn-save i {
            font-size: 1.5rem;
        }

        /* [Expert] 시각적 가중치 카운터 스타일 */
        .weight-indicator {
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 55px;
            text-align: right;
            font-family: inherit;
            transition: color 0.3s, transform 0.2s;
            flex-shrink: 0;
            user-select: none;
            font-weight: 600;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: var(--glass-border);
            color: #fff;
        }

        /* 모달 (오리지널 복원) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            width: 92%;
            max-width: 400px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-radius: 28px;
            padding: 24px;
            padding-bottom: 12px;
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .modal-body {
            overflow-y: auto;
            flex: 1;
            padding-right: 8px;
            margin-right: -8px;
        }

        /* 스크롤바 커스텀 */
        .modal-body::-webkit-scrollbar {
            width: 5px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-description {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.4;
        }

        .btn-modal-save {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: #fff;
            font-size: 1.1rem;
        }

        /* 탭 관리용 리스트 스타일 */
        .tab-mgmt-list {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
        }

        .tab-mgmt-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-mgmt-item:last-child {
            border-bottom: none;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding-bottom: 20px;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="toast">알림 메시지</div>
    <div class="container" id="app">
        <header>
            <h1>냉장고 품목 재고 관리 <span
                    style="font-size: 0.8rem; vertical-align: top; font-weight: 400; opacity: 0.7;">v5.1.2</span></h1>
        </header>

        <div class="tab-bar" id="tab-bar"></div>

        <div class="glass-card">
            <div id="inventory-list"></div>
        </div>

        <div class="action-area">
            <button class="btn-main btn-refresh" onclick="refreshEink()">
                <i class="mdi mdi-refresh"></i> 화면 즉시 갱신
            </button>
            <button class="btn-main btn-outline" onclick="openSettings()">
                <i class="mdi mdi-cog"></i> 시스템 설정
            </button>
        </div>

        <footer>
            © 2026 Matter eink-fridge | Designed by 돼지지렁이 v.5.1.2
        </footer>
    </div>

    <!-- 설정 모달 (유저 이미지의 디자인 그대로 복원) -->
    <div class="modal-overlay" id="modal-settings">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-label">탭 설정</div>
                <button style="background:none; border:none; color:#fff; cursor:pointer;" onclick="closeSettings()">
                    <i class="mdi mdi-close" style="font-size: 26px; opacity: 0.7;"></i>
                </button>
            </div>

            <div class="modal-body">
                <div id="tab-specific-settings">
                    <!-- [자주 쓰는 설정] -->
                    <div class="form-group">
                        <label class="form-label">탭 이름 변경</label>
                        <input type="text" id="config-name" style="width: 100%;" placeholder="예: 냉장고">
                    </div>

                    <div class="form-group">
                        <label class="form-label">입력 모드 (단기/장기)</label>
                        <select id="config-mode" style="width: 100%;" onchange="updateConfigCountOptions()">
                            <option value="short">단기 모드 (품목+수량)</option>
                            <option value="long">장기 모드 (긴 텍스트 20자)</option>
                        </select>
                    </div>

                    <div class="form-group" id="group-config-count">
                        <label class="form-label">화면 표시 항목 개수</label>
                        <select id="config-count" style="width: 100%;">
                            <!-- Options will be populated dynamically (v5.0.5) -->
                        </select>
                    </div>

                    <hr style="opacity:0.05; margin:20px 0;">
                    <div
                        style="font-size:0.75rem; color:var(--accent-color); font-weight:700; margin-bottom:15px; opacity:0.8;">
                        시스템 연동 설정 (초기 1회 권장)</div>

                    <div class="form-group">
                        <label class="form-label">HA 스크립트 엔티티 (갱신용)</label>
                        <input type="text" id="config-script" style="width: 100%;" placeholder="script.eink_fridge">
                        <div class="form-description">해당 카테고리를 담당하는 HA 스크립트 ID를 입력하세요.</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">카테고리 고유 ID (HA 연동용)</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="config-id" readonly
                                style="flex:1; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); border-radius:12px; color:var(--accent-color); font-family:monospace; font-size:0.85rem; padding:10px 14px;"
                                value="cat_...">
                            <button class="btn-save" onclick="copyId()"
                                style="width:48px; height:42px; border-radius:12px;"><i
                                    class="mdi mdi-content-copy"></i></button>
                        </div>
                    </div>
                </div>

                <button class="btn-main btn-modal-save" onclick="saveCurrentTabSettings()">설정 저장</button>

                <hr style="opacity:0.05; margin:20px 0;">

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-size:0.85rem; font-weight:700; color:var(--accent-color);">동적 탭 관리 (v4.0)</span>
                    <button onclick="addNewCategory()"
                        style="background:none; border:none; color:var(--accent-color); font-size:0.8rem; cursor:pointer;">+
                        새 탭 추가</button>
                </div>

                <div class="tab-mgmt-list" id="tab-mgmt-list">
                    <!-- 탭 리스트 및 삭제 버튼 -->
                </div>
            </div>
        </div>

        <script>
            // [Expert] 시각적 가중치 계산 (ASCII 1점, 그 외 2점)
            function getVisualWeight(str) {
                if (!str) return 0;
                let weight = 0;
                for (const char of str) {
                    weight += char.charCodeAt(0) > 128 ? 2 : 1;
                }
                return weight;
            }

            // [Expert] 시각적 가중치 기반 입력 통제 및 카운터 업데이트
            function enforceVisualLength(inputElem, maxWeight) {
                let v_id = inputElem.id.split('_')[1];
                let weightIndicator = document.getElementById(`w_${v_id}`);

                let val = inputElem.value;
                let weight = 0;
                let result = '';

                for (const char of val) {
                    const charWeight = char.charCodeAt(0) > 128 ? 2 : 1;
                    if (weight + charWeight > maxWeight) break;
                    weight += charWeight;
                    result += char;
                }

                if (val !== result) {
                    inputElem.value = result;
                }

                // 카운터 텍스트 업데이트 ("X 자" 형식)
                if (weightIndicator) {
                    weightIndicator.textContent = `${weight} 자`;
                    weightIndicator.style.opacity = weight >= maxWeight ? "1" : "0.6";
                }
            }

            let categories = [];
            let currentCatId = null;
            let inventoryItems = [];

            window.onload = () => initApp();

            async function initApp() {
                try {
                    const res = await fetch('/api/categories');
                    if (!res.ok) {
                        const errInfo = await res.json().catch(() => ({}));
                        throw new Error(errInfo.detail || res.statusText || '서버 응답 오류');
                    }
                    categories = await res.json();

                    // [v5.0.3] URL에서 catId 파라미터 확인 후 즉시 제거 (휘발성 처리)
                    const urlParams = new URLSearchParams(window.location.search);
                    const savedId = urlParams.get('catId');

                    // 파라미터가 있으면 읽은 후 URL을 깨끗하게 정리 (다음 F5 시 첫 탭으로 돌아가게 함)
                    if (savedId) {
                        history.replaceState({}, document.title, window.location.pathname);
                    }

                    if (categories.length > 0) {
                        // 저장된 ID가 있으면 해당 탭으로, 없으면 첫 번째 탭으로 초기화
                        currentCatId = categories.find(c => c.id === savedId) ? savedId : categories[0].id;
                        renderTabs();
                        await loadInventory();
                    }
                } catch (err) {
                    console.error(err);
                    showToast(`초기화 실패: ${err.message}`);
                }
            }

            function renderTabs() {
                const bar = document.getElementById('tab-bar');
                bar.innerHTML = '';
                categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = `tab-item ${cat.id === currentCatId ? 'active' : ''}`;
                    div.textContent = cat.name;
                    div.onclick = () => switchTab(cat.id);
                    bar.appendChild(div);
                });
            }

            async function switchTab(id) {
                if (currentCatId === id) return;
                currentCatId = id;
                renderTabs();
                await loadInventory();
            }

            async function loadInventory() {
                const container = document.getElementById('inventory-list');
                container.innerHTML = '<div style="text-align:center; padding-top:80px; opacity:0.3;">데이터 로딩 중...</div>';
                try {
                    const res = await fetch(`/api/inventory/${currentCatId}`);
                    inventoryItems = await res.json();
                    renderInventoryList();
                } catch (err) { showToast('데이터 로딩 에러'); }
            }

            function renderInventoryList() {
                const container = document.getElementById('inventory-list');
                container.innerHTML = '';
                const cat = categories.find(c => c.id === currentCatId);
                const mode = cat?.config?.mode || 'short';
                const count = (cat?.config?.count) ? parseInt(cat.config.count) : (mode === 'long' ? 4 : 9);

                for (let i = 0; i < count; i++) {
                    const item = inventoryItems.find(it => it.id == i + 1) || { id: i + 1, pummog: '', suryang: '' };
                    const div = document.createElement('div');
                    div.className = 'list-item';

                    if (mode === 'long') {
                        // 장기 모드: 버튼 삭제, 자동 저장(onblur), 가중치 표시기("자" 단위) 추가
                        const weight = getVisualWeight(item.pummog);
                        div.innerHTML = `
                        <input type="text" class="input-pummog" style="flex:1;" id="p_${item.id}" value="${item.pummog}" 
                               placeholder="가득 찰 때까지 유연하게 입력" oninput="enforceVisualLength(this, 40)" onblur="saveRow(${item.id})">
                        <div class="weight-indicator" id="w_${item.id}">${weight} 자</div>
                    `;
                    } else {
                        // 단기 모드: 버튼 삭제, 자동 저장(onblur)
                        div.innerHTML = `
                        <input type="text" class="input-pummog" id="p_${item.id}" value="${item.pummog}" placeholder="품목" maxlength="6" onblur="saveRow(${item.id})">
                        <input type="text" class="input-suryang" id="s_${item.id}" value="${item.suryang}" placeholder="수량" maxlength="3" onblur="saveRow(${item.id})">
                        <div class="weight-indicator" id="w_${item.id}" style="visibility:hidden;">0 자</div>
                    `;
                    }
                    container.appendChild(div);
                }
            }

            async function saveRow(idx) {
                const cat = categories.find(c => c.id === currentCatId);
                const mode = cat?.config?.mode || 'short';
                const pummog = document.getElementById(`p_${idx}`).value.trim();
                const suryang = mode === 'long' ? "" : document.getElementById(`s_${idx}`).value.trim();

                // [Expert] 시각적 피드백: 카운터 색상 변경 (저장 시도 중)
                const indicator = document.getElementById(`w_${idx}`);
                if (indicator && mode === 'long') {
                    indicator.style.color = 'var(--accent-color)';
                }

                try {
                    const res = await fetch(`/api/inventory/${currentCatId}/${idx}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pummog, suryang })
                    });
                    if (res.ok) {
                        // [Expert] 성공 피드백: 초록색으로 잠시 변함
                        if (indicator && mode === 'long') {
                            indicator.style.color = 'var(--success-color)';
                            indicator.style.transform = 'scale(1.1)';
                            setTimeout(() => {
                                indicator.style.color = '';
                                indicator.style.transform = '';
                            }, 1500);
                        } else {
                            console.log(`[Auto-Save] Item ${idx} saved.`);
                        }
                    }
                } catch (err) {
                    if (indicator && mode === 'long') {
                        indicator.style.color = 'var(--error-color)';
                    }
                    showToast('자동 저장 실패');
                }
            }

            async function refreshEink() {
                const cat = categories.find(c => c.id === currentCatId);
                if (!cat?.config?.script_entity) {
                    return showToast('최초 등록을 해주세요.');
                }

                const btn = document.querySelector('.btn-refresh');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="mdi mdi-loading spin"></i> 저장 및 전송 중...';
                btn.disabled = true;

                try {
                    // 1. 현재 화면의 모든 필드 추출 (Point 2: 레이스 컨디션 방지)
                    const container = document.getElementById('inventory-list');
                    const rows = container.querySelectorAll('.list-item');
                    const mode = cat?.config?.mode || 'short';
                    const items = [];

                    rows.forEach((row, index) => {
                        const pummog = row.querySelector('.input-pummog').value.trim();
                        const suryang = mode === 'long' ? "" : row.querySelector('.input-suryang').value.trim();
                        items.push({ id: index + 1, pummog, suryang });
                    });

                    // 2. HA 화면 갱신 신호 전송 (최신 데이터 포함)
                    const res = await fetch(`/api/refresh/${currentCatId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items })
                    });

                    if (res.ok) {
                        showToast('데이터 저장 및 화면 갱신을 성공했습니다.');
                        // 서버에서도 저장되었으므로 로컬 항목 업데이트 필요 시 loadInventory 호출 가능
                        // 여기서는 즉시성 보강을 위해 무시하거나 간략 처리
                    } else {
                        const errData = await res.json().catch(() => ({}));
                        if (res.status === 400 || res.status === 404) {
                            showToast('엔티티 이름을 확인해주세요.');
                        } else {
                            showToast(`HA 오류: ${errData.detail || '서비스 호출 실패'}`);
                        }
                    }
                } catch (err) {
                    showToast('네트워크 오류: 서버 연결을 확인하세요.');
                } finally {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                }
            }

            async function saveAllFields() {
                const container = document.getElementById('inventory-list');
                const rows = container.querySelectorAll('.list-item');
                const cat = categories.find(c => c.id === currentCatId);
                const mode = cat?.config?.mode || 'short';
                const items = [];

                rows.forEach((row, index) => {
                    const pummog = row.querySelector('.input-pummog').value.trim();
                    const suryang = mode === 'long' ? "" : row.querySelector('.input-suryang').value.trim();
                    items.push({ id: index + 1, pummog, suryang });
                });

                // [v4.3.1] 단 한 번의 호출로 모든 데이터를 원자적으로 저장하여 충돌 방지
                const res = await fetch(`/api/inventory/${currentCatId}/bulk`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });

                if (!res.ok) throw new Error('일괄 저장 실패');
                console.log(`[SYSTEM] ${items.length}개 항목 일괄 저장 완료`);
            }

            // --- 설정 및 탭 관리 ---

            function openSettings() {
                if (categories.length === 0) {
                    showToast('초기화되지 않은 상태입니다. 서버 연결을 확인하세요.');
                    return;
                }
                const cat = categories.find(c => c.id === currentCatId) || categories[0];
                document.getElementById('modal-label').textContent = `${cat.name} 설정`;
                document.getElementById('config-id').value = cat.id; // ID 표시
                document.getElementById('config-mode').value = cat.config?.mode || 'short';

                // 모드에 따라 개수 설정 동적 변경 (v5.0.5)
                updateConfigCountOptions(cat.config?.count || (cat.config?.mode === 'long' ? 4 : 9));

                document.getElementById('config-script').value = cat.config?.script_entity || '';
                document.getElementById('config-name').value = cat.name;

                renderTabMgmtList();
                const modal = document.getElementById('modal-settings');
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 10);
            }

            function closeSettings() {
                const modal = document.getElementById('modal-settings');
                modal.classList.remove('show');
                setTimeout(() => modal.style.display = 'none', 300);
            }

            function renderTabMgmtList() {
                const list = document.getElementById('tab-mgmt-list');
                list.innerHTML = '';
                categories.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = 'tab-mgmt-item';
                    item.innerHTML = `
                    <span style="font-size:0.85rem; opacity:0.8;">${cat.name}</span>
                    <button onclick="deleteCategory('${cat.id}')" style="background:none; border:none; color:var(--error-color); cursor:pointer;">
                        <i class="mdi mdi-trash-can-outline"></i>
                    </button>
                `;
                    list.appendChild(item);
                });
            }

            async function saveCurrentTabSettings() {
                const name = document.getElementById('config-name').value.trim() || '새 탭';
                const mode = document.getElementById('config-mode').value;
                const count = parseInt(document.getElementById('config-count').value);
                const script_entity = document.getElementById('config-script').value.trim();

                const res = await fetch(`/api/categories/${currentCatId}`, {
                    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, config: { count, script_entity, mode } })
                });

                if (res.ok) {
                    showToast('설정이 저장되었습니다.');
                    // 현재 탭 ID를 유지하며 새로고침 (v4.3.2)
                    window.location.href = window.location.pathname + '?catId=' + currentCatId;
                }
            }

            async function addNewCategory() {
                if (categories.length >= 4) return showToast('최대 4개까지만 가능합니다.');
                const name = prompt('새로운 탭 이름을 입력하세요:', '새 탭');
                if (name === null) return; // 취소 버튼 클릭 시 중단

                const res = await fetch('/api/categories', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name.trim() || '새 탭' })
                });
                if (res.ok) {
                    const data = await res.json();
                    // 새로 생성된 탭으로 이동 (v4.3.2)
                    window.location.href = window.location.pathname + '?catId=' + data.id;
                }
            }

            async function deleteCategory(id) {
                if (categories.length <= 1) return showToast('최소 1개는 유지해야 합니다.');
                if (!confirm('정말 삭제하시겠습니까? 데이터가 모두 사라집니다.')) return;
                const res = await fetch(`/api/categories/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    // 첫 번째 탭으로 리다이렉트
                    window.location.href = window.location.pathname;
                }
            }

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function copyId() {
                const idInput = document.getElementById('config-id');
                idInput.select();
                document.execCommand('copy');
                showToast('ID가 클립보드에 복사되었습니다.');
            }

            // [v5.0.5] 모드에 따라 항목 개수 선택 옵션을 동적으로 변경
            function updateConfigCountOptions(currentCount) {
                const mode = document.getElementById('config-mode').value;
                const countSelect = document.getElementById('config-count');
                const val = currentCount || countSelect.value;

                countSelect.innerHTML = ''; // 초기화

                if (mode === 'long') {
                    // 장기 모드: 3개, 4개 선택 가능
                    const options = [3, 4];
                    options.forEach(num => {
                        const opt = document.createElement('option');
                        opt.value = num;
                        opt.textContent = `${num}개`;
                        countSelect.appendChild(opt);
                    });
                    // 기존 값이 유효하면 유지, 아니면 4로 기본값
                    countSelect.value = [3, 4].includes(parseInt(val)) ? val : 4;
                } else {
                    // 단기 모드: 3개, 6개, 9개 선택 가능
                    const options = [3, 6, 9];
                    options.forEach(num => {
                        const opt = document.createElement('option');
                        opt.value = num;
                        opt.textContent = `${num}개`;
                        countSelect.appendChild(opt);
                    });
                    // 기존 값이 유효하면 유지, 아니면 9로 기본값
                    countSelect.value = [3, 6, 9].includes(parseInt(val)) ? val : 9;
                }
            }
        </script>
</body>

</html>
